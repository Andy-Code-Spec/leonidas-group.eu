<style>

*{box-sizing:border-box}html{scroll-behavior:smooth}@media (prefers-reduced-motion:reduce){html{scroll-behavior:auto}}
body{margin:0;font-family:var(--sans);color:var(--ink);background:var(--ivory);line-height:1.65;font-size:17px;-webkit-font-smoothing:antialiased;text-rendering:optimizeLegibility}
a{color:inherit;text-decoration:none}h1,h2,h3{font-family:var(--serif);font-weight:500;line-height:1.12;margin:0;letter-spacing:.2px}p{margin:0}
.skip{position:absolute;left:-9999px;top:0;background:var(--gold);color:var(--navy);padding:12px 18px;z-index:300;font-weight:600}.skip:focus{left:12px;top:12px}

.wrap{max-width:var(--maxw);margin:0 auto;padding:0 var(--pad)}
.eyebrow{font-family:var(--sans);font-weight:600;font-size:.72rem;letter-spacing:.22em;text-transform:uppercase;color:var(--gold);margin-bottom:18px}
.section{padding:clamp(60px,8.5vw,120px) 0}
.section--navy{background:var(--navy);color:var(--ivory)}.section--anthracite{background:var(--anthracite);color:var(--ivory)}

.rule{width:64px;height:2px;background:var(--gold);margin:0 0 26px}
.lead{font-size:clamp(1.05rem,1.6vw,1.22rem);max-width:66ch;color:inherit}
.section--navy .lead,.section--anthracite .lead{color:rgba(247,247,244,.84)}.muted-on-navy{color:rgba(247,247,244,.74)}
.h-lg{font-size:clamp(1.9rem,3.6vw,2.95rem);max-width:30ch}
.header{position:sticky;top:0;z-index:100;background:var(--navy-80);backdrop-filter:saturate(140%) blur(10px);transition:box-shadow .35s}.header.scrolled{box-shadow:0 1px 0 var(--line-light)}
.nav{display:flex;align-items:center;justify-content:space-between;gap:16px;padding:12px var(--pad)}
.brand{display:flex;align-items:center;gap:14px;min-width:0}.brand .logo{height:72px;width:auto;flex:0 0 auto}
.brand .descriptor{display:flex;flex-direction:column;line-height:1.3;border-left:1px solid var(--line-light);padding-left:14px}
.brand .descriptor span{font-family:var(--sans);font-weight:600;font-size:.57rem;letter-spacing:.15em;text-transform:uppercase;color:rgba(247,247,244,.72)}
.nav-right{display:flex;align-items:center;gap:16px}
.navlinks{display:flex;align-items:center;gap:18px}
.navlinks a{font-size:.78rem;font-weight:500;letter-spacing:.02em;color:rgba(247,247,244,.86);padding:6px 0;position:relative;white-space:nowrap}
.navlinks a::after{content:"";position:absolute;left:0;bottom:-2px;width:0;height:1.5px;background:var(--gold);transition:width .25s}.navlinks a:hover{color:var(--ivory)}.navlinks a:hover::after{width:100%}
.lang-inline{display:flex;align-items:center;border:1px solid var(--gold);flex:0 0 auto}
.lang-inline button{background:none;border:0;color:rgba(247,247,244,.85);font-family:var(--sans);font-weight:600;font-size:.68rem;letter-spacing:.04em;padding:6px 8px;cursor:pointer;border-left:1px solid rgba(184,152,92,.4)}
.lang-inline button:first-child{border-left:0}.lang-inline button[aria-pressed="true"]{background:var(--gold);color:var(--navy)}
.lang-dd{display:none;position:relative}.lang-dd summary{list-style:none;display:flex;align-items:center;gap:7px;color:var(--ivory);border:1px solid var(--gold);padding:7px 11px;cursor:pointer;font-weight:600;font-size:.74rem}
.lang-dd summary::-webkit-details-marker{display:none}.lang-dd[open] summary{background:var(--gold);color:var(--navy)}
.lang-menu{position:absolute;right:0;top:calc(100% + 6px);background:var(--navy);border:1px solid var(--gold);display:flex;flex-direction:column;min-width:150px;z-index:130}

.btn{display:inline-flex;align-items:center;gap:10px;font-family:var(--sans);font-weight:600;font-size:.9rem;padding:15px 28px;border:1px solid var(--gold);cursor:pointer;transition:.25s}
.btn--solid{background:var(--gold);color:var(--navy)}.btn--solid:hover{background:var(--gold-rich);border-color:var(--gold-rich)}
.btn--ghost{background:transparent;color:var(--gold)}.btn--ghost:hover{background:var(--gold);color:var(--navy)}
.section--navy .btn--ghost{color:var(--ivory);border-color:rgba(247,247,244,.5)}.section--navy .btn--ghost:hover{background:var(--ivory);color:var(--navy);border-color:var(--ivory)}
.hero{position:relative;background:radial-gradient(120% 90% at 80% -10%,#16314a 0%,var(--navy) 55%,#081320 100%);color:var(--ivory);overflow:hidden;padding:clamp(84px,13vh,150px) 0 clamp(64px,9vw,110px)}
.hero .inner{position:relative;z-index:2;max-width:50rem}.hero h1{font-size:clamp(2.6rem,6vw,4.5rem);font-weight:500;margin:6px 0 22px}
.hero .sub{font-size:clamp(1.05rem,1.8vw,1.3rem);color:rgba(247,247,244,.86);max-width:52ch}
.split{display:grid;grid-template-columns:1.05fr 1fr;gap:clamp(32px,6vw,80px);align-items:start}.split h2{font-size:clamp(1.9rem,3.4vw,2.8rem);max-width:20ch}
.forceslabel{margin-top:46px;margin-bottom:0}
.forces{display:grid;grid-template-columns:repeat(5,1fr);gap:1px;background:var(--line-light);border:1px solid var(--line-light);margin-top:18px}
.force{background:#11243a;padding:22px 18px}.force .fn{font-family:var(--serif);font-size:1.5rem;color:var(--gold);display:block;margin-bottom:8px}.force p{font-size:.84rem;color:rgba(247,247,244,.82)}
.src-note{margin-top:30px;font-size:.86rem;color:rgba(247,247,244,.66);max-width:80ch;border-left:2px solid var(--gold);padding-left:16px}
.grid-cards{display:grid;grid-template-columns:repeat(4,1fr);gap:1px;background:var(--line);border:1px solid var(--line);margin-top:46px}
.card{position:relative;background:var(--ivory);padding:34px 28px 30px;display:flex;flex-direction:column;transition:transform .3s,background .3s}
.card:hover{background:#fff;transform:translateY(-3px)}
.card .badge{position:absolute;top:16px;right:16px;font-size:.56rem;letter-spacing:.1em;text-transform:uppercase;color:var(--gold);border:1px solid var(--gold);padding:3px 8px;font-weight:600;white-space:nowrap}

.synergy{margin-top:1px;background:var(--navy);color:var(--ivory);padding:38px 34px;border:1px solid var(--line)}
.synergy h3{font-size:clamp(1.4rem,2.4vw,1.9rem);margin-bottom:12px}.synergy p{color:rgba(247,247,244,.84);font-size:1rem;max-width:92ch}
.pmv .block{display:grid;grid-template-columns:.5fr 1fr;gap:clamp(20px,4vw,56px);padding:38px 0;border-top:1px solid var(--line)}
.pmv .block:first-of-type{border-top:0}.pmv .block .lab{font-family:var(--sans);font-weight:600;font-size:.72rem;letter-spacing:.16em;text-transform:uppercase;color:var(--gold)}
.pmv .block h3{font-size:clamp(1.5rem,2.6vw,2.1rem);margin-bottom:14px}
.timeline{margin-top:50px;display:grid;grid-template-columns:repeat(3,1fr);gap:1px;background:var(--line-light);border:1px solid var(--line-light)}
.phase{background:var(--navy);padding:36px 30px}.phase .ph-no{font-family:var(--serif);font-size:2.4rem;color:var(--gold);line-height:1;margin-bottom:10px}.phase h3{font-size:1.22rem;color:var(--ivory);margin-bottom:13px}.phase p{font-size:.9rem;color:rgba(247,247,244,.76)}

.role{background:var(--ivory);padding:28px 22px;display:flex;flex-direction:column;gap:12px}.role:hover{background:#fff}.role .rn{font-family:var(--serif);color:var(--gold);font-size:1.1rem}.role h3{font-size:1.04rem;line-height:1.22}.role p{font-size:.83rem;color:var(--muted)}

.footer .f-top{display:flex;gap:24px;justify-content:space-between;flex-wrap:wrap;align-items:flex-start}.footer .logo{height:64px;width:auto}
.footer .f-desc{font-size:.64rem;letter-spacing:.14em;text-transform:uppercase;color:rgba(247,247,244,.55);margin-top:14px;max-width:42ch}
.footer nav{display:flex;gap:18px;flex-wrap:wrap}.footer nav a{font-size:.78rem;color:rgba(247,247,244,.7)}.footer nav a:hover{color:var(--gold)}
.footer .f-legal{margin-top:38px;padding-top:22px;border-top:1px solid var(--line-light);font-size:.74rem;color:rgba(247,247,244,.5);max-width:80ch}
.reveal{opacity:0;transform:translateY(16px);transition:opacity .7s,transform .7s}.reveal.in{opacity:1;transform:none}
@media (prefers-reduced-motion:reduce){.reveal{opacity:1;transform:none;transition:none}}
@media (max-width:1180px){.navlinks{position:fixed;inset:0 0 0 auto;width:min(86vw,380px);background:var(--navy);flex-direction:column;align-items:flex-start;justify-content:center;gap:22px;padding:48px 40px;transform:translateX(100%);transition:transform .35s;box-shadow:-20px 0 60px rgba(0,0,0,.45);z-index:120;overflow-y:auto}.navlinks.open{transform:none}.navlinks a{font-size:1.05rem}.burger{display:block;order:3}.lang-inline{display:none}.lang-dd{display:block}.brand .descriptor{display:none}}

<script>
var I18N={"de": {"languageName": "Deutsch", "descriptorLine1": "Independent Film Finance", "descriptorLine2": "& European Film Infrastructure", "nav": {"purpose": "Purpose", "mission": "Mission", "vision": "Vision", "ecosystem": "Ökosystem", "roadmap": "Roadmap", "participate": "Mitwirken", "contact": "Kontakt"}, "hero": {"eyebrow": "INDEPENDENT FILM FINANCE & EUROPEAN FILM INFRASTRUCTURE", "headline": "Wir sichern und gestalten die Zukunft des europäischen Films.", "subheadline": "LEONIDAS entwickelt ein integriertes europäisches Ökosystem — von der Finanzierung von Filmen bis hin zur digitalen Monetarisierung.", "ctaPrimary": "Ökosystem entdecken", "ctaSecondary": "Roadmap ansehen"}, "quick": {"headline": "Acht spezialisierte Plattformen — ein integrierter Kreislauf.", "body": "LEONIDAS verbindet Finanzierung, Herstellungs-Support, Auswertung, Handelbarkeit und Kinoinfrastruktur in einer gemeinsamen europäischen Architektur. Projekte werden strukturiert geprüft, Finanzierungslücken geschlossen, geeignete Produktions- und Auswertungswege erschlossen und Erlösströme langfristig besser miteinander verbunden."}, "purpose": {"eyebrow": "WARUM ES LEONIDAS GIBT", "headline": "Film ist Kulturgut. Wirtschaftsgut. Gesellschaftlich relevant. Und Infrastruktur.", "body": "Europa braucht unabhängige Filme, starke Produktionsstrukturen und Orte, an denen Geschichten sichtbar werden. LEONIDAS will die wirtschaftlichen, technologischen und infrastrukturellen Voraussetzungen dafür langfristig stärken."}, "mission": {"eyebrow": "WAS WIR AUFBAUEN", "headline": "Wir verbinden, was heute fragmentiert ist.", "body": "Die europäische Filmwirtschaft ist kreativ stark, aber strukturell fragmentiert. Finanzierung, Distribution, Rechteverwaltung, Handel, Kinoinfrastruktur, Technologie und künstliche Intelligenz werden bislang meist getrennt gedacht. LEONIDAS entwickelt eine gemeinsame Infrastruktur, die diese Bereiche verbindet. Für Produzenten. Für Verleiher. Für Investoren. Für Kreative. Für Europa."}, "vision": {"eyebrow": "WOHIN WIR WOLLEN", "headline": "Film als eigenständige Assetklasse. Kultur als strategische Infrastruktur.", "body": "LEONIDAS verfolgt eine langfristige Vision: Film und audiovisuelle Inhalte sollen als eigenständige Anlageklasse etablierbar werden — als ein professionell strukturierter Markt mit transparenten Prozessen, belastbaren Daten und neuen Zugängen zu Kapital. Ein Markt, auf dem audiovisuelle Werke transparenter finanziert, effizienter unterstützt, besser ausgewertet und digital monetarisiert werden können. Gleichzeitig verstehen wir Kultur nicht nur als Inhalt, sondern als strategische Infrastruktur für eine offene, vielfältige und souveräne europäische Gesellschaft."}, "ecosystem": {"eyebrow": "DAS LEONIDAS-ÖKOSYSTEM", "headline": "Acht spezialisierte Plattformen — ein integrierter Kreislauf.", "intro": "LEONIDAS ist als Dachmarke angelegt. Darunter entstehen spezialisierte Lösungen, die miteinander verbunden sind und schrittweise zu einer gemeinsamen Infrastruktur wachsen. Jede Plattform erfüllt eine klar definierte Aufgabe. Gemeinsam bilden sie einen Kreislauf: von der Auswahl und Finanzierung eines Filmprojekts bis zu Streaming, Handelbarkeit, fondsbasierter Finanzierung und dem langfristigen Erhalt von Kinoräumen. Projekte werden strukturiert geprüft, Finanzierungslücken geschlossen, geeignete Produktions- und Auswertungswege erschlossen und Erlösströme langfristig besser miteinander verbunden — in einer gemeinsamen europäischen Architektur.", "synergiesHeadline": "Einmal geprüft. Mehrfach nutzbar. Gemeinsam skalierbar.", "synergiesBody": "CineVest und CineExchange teilen sich das Green-Light-Verfahren und die Due Diligence. Ein Filmprojekt wird strukturiert geprüft und kann nach Freigabe in weiteren geeigneten Bereichen des LEONIDAS-Ökosystems weiterverarbeitet werden. Das reduziert Doppelarbeit, rationalisiert Kosten für Produzenten und schafft eine gemeinsame Datengrundlage für Finanzierung, Handelbarkeit, Auswertung und fondsbasierte Portfolios.", "cards": [{"name": "CineVest", "tagline": "GAP-Finanzierung für unabhängige Filmprojekte.", "body": "CineVest ist die geplante Plattform für projektbezogene GAP-Finanzierungen. Für ausgewählte Filmprojekte können digitale, projektbezogene Finanzinstrumente strukturiert und geeigneten Kapitalgebern zugänglich gemacht werden. So soll die verbleibende Finanzierungslücke eines Produzenten transparent und nachvollziehbar geschlossen werden.", "status": "Phase 1"}, {"name": "CineExchange", "tagline": "Handelbarkeit und Sekundärmärkte für Film-Assets.", "body": "CineExchange ist als Handels- und Marktplatzinfrastruktur für ausgewählte digitale Film-Assets und projektbezogene Finanzinstrumente geplant. Nach dem Green-Light und der erfolgreichen Strukturierung eines Projekts soll langfristig auch ein Sekundärmarkt entstehen, auf dem Film-Assets zunächst im B2B- und später im B2C-Bereich handelbar werden.", "status": "Phase 1 / Phase 3"}, {"name": "CineFinance", "tagline": "Spezialisierte Zwischenfinanzierung für Filmproduktionen.", "body": "CineFinance adressiert den besonderen Zwischenfinanzierungsbedarf der Filmwirtschaft. Zugesagte Mittel aus Förderungen, Senderbeteiligungen, Vertriebsvereinbarungen oder weiteren Finanzierungsbausteinen fließen häufig zeitversetzt. CineFinance soll dafür spezialisierte Finanzierungslösungen in einer regulatorisch geeigneten Struktur bereitstellen.", "status": "Phase 2"}, {"name": "CineGen", "tagline": "KI-gestützte Filmherstellung mit Branchenkompetenz.", "body": "CineGen entwickelt eine KI-gestützte Produktions- und Kollaborationsplattform für audiovisuelle Inhalte. Die Besonderheit: klassische Gewerke und Departments der Filmherstellung bleiben strukturell abgebildet. So wird Branchenkompetenz in die nächste Produktionsrealität überführt, statt sie zu verdrängen.", "status": "Phase 1"}, {"name": "CineAI", "tagline": "Streaming- und Auswertungsraum für KI-generierte Filme.", "body": "CineAI ist als spezialisierte Streaming- und Auswertungsplattform für KI-generierte audiovisuelle Inhalte gedacht. Sie schafft frühzeitig einen Markt- und Erfahrungsraum für neue Formate und soll später mit CineStream zusammenwachsen. Perspektivisch können auch hier digitale Rechte- und Erlösmodelle eingebunden werden.", "status": "Phase 1"}, {"name": "CineStream", "tagline": "Streaming, Auswertung und digitale Monetarisierung.", "body": "CineStream ist die geplante Streaming- und Auswertungsplattform für Filme aus dem LEONIDAS-Ökosystem und perspektivisch auch für externe Inhalte. Ziel ist eine transparente Monetarisierung entlang der jeweiligen Rechte- und Erlösstruktur. Soweit rechtlich und technisch möglich, können automatisierte Micro-Payments spätere Erlösbeteiligungen unterstützen.", "status": "Phase 2"}, {"name": "CineProperties", "tagline": "Räume für die Zukunft des Kinos.", "body": "CineProperties ist als langfristige Immobilien- und Infrastrukturgesellschaft für gefährdete oder strategisch relevante Kinostandorte gedacht. Ausgewählte Kino-Gewerbeeinheiten sollen gesichert und nachhaltig an Betreiber vermietet werden. So bleibt Kino als Kulturgut und als wirtschaftlicher Auswertungsraum für Filme erhalten.", "status": "Phase 3"}, {"name": "CineFund", "tagline": "Kuratierte Filmportfolios für institutionelles Kapital.", "body": "CineFund ist die geplante fondsbasierte Infrastruktur innerhalb des LEONIDAS-Ökosystems. Family Offices, Institutionen und weitere geeignete Kapitalgeber können perspektivisch eigene Fonds oder kuratierte Filmportfolios aufsetzen und Projekte aus dem CineVest-Pool auswählen. Zugelassen werden ausschließlich Projekte mit bestätigtem Green-Light für die GAP-Finanzierung.", "status": "Phase 2"}]}, "participation": {"eyebrow": "MITWIRKEN", "headline": "Unterschiedliche Rollen. Gemeinsames Ziel.", "intro": "LEONIDAS spricht mit Marktteilnehmern und Kapitalgebern, die Europas Filmwirtschaft langfristig stärken wollen.", "roles": [{"name": "Produzenten und Verleiher", "body": "Bringen Projekte, Marktwissen und Branchenkompetenz ein und können perspektivisch als strategisch beteiligte Partner Teil des Ökosystems werden."}, {"name": "Kinobetreiber und Immobilienpartner", "body": "Unterstützen den langfristigen Erhalt von Kinoräumen und die Entwicklung nachhaltiger Betreiber- und Mietmodelle."}, {"name": "Strategische Investoren", "body": "Beteiligen sich perspektivisch an LEONIDAS oder einzelnen Gesellschaften der Gruppe und unterstützen den langfristigen Aufbau der Infrastruktur."}, {"name": "Projektbezogene Kapitalgeber", "body": "Stellen Kapital für ausgewählte GAP-Finanzierungen über CineVest bereit und schließen Finanzierungslücken einzelner Filmprojekte."}, {"name": "Institutionelle Kapitalgeber und Family Offices", "body": "Können perspektivisch über CineFund eigene kuratierte Filmportfolios aufsetzen und geeignete Projekte aus dem CineVest-Pool auswählen."}], "cta": "Gespräch anfragen"}, "roadmap": {"eyebrow": "UNSER WEG", "headline": "Schritt für Schritt zur europäischen Film-Infrastruktur.", "phases": [{"title": "Phase 1 — Fundament und Markteintritt", "body": "LEONIDAS, CineVest, CineExchange B2B, CineGen, CineAI und erste strategische Partnerschaften."}, {"title": "Phase 2 — Finanzierungs- und Auswertungsökosystem", "body": "CineFinance, CineFund, CineStream und das Film & Finance Summit."}, {"title": "Phase 3 — Skalierung und Infrastruktur", "body": "CineExchange B2C — Film als Assetklasse, Ausbau von CineProperties, europäische Skalierung und langfristige Vernetzung der Daten-, Zahlungs- und Auswertungsströme."}]}, "industry": {"eyebrow": "GEMEINSAM MIT DER BRANCHE", "headline": "Gebaut mit der Branche. Für die Branche.", "body": "LEONIDAS soll Produzenten und Verleiher als strategische Partner einbinden. Das schafft Nähe zum Markt, langfristige Kundenbindung und professionelle Schwarmintelligenz. Durch die Einbindung vieler erfahrener Marktteilnehmer bündelt LEONIDAS Branchenwissen und entwickelt eine Infrastruktur, die sich an realen Produktions- und Auswertungsprozessen orientiert."}, "closing": {"eyebrow": "GEMEINSAM GESTALTEN", "headline": "Damit Europas Geschichten eine Zukunft haben.", "body": "Sprechen wir darüber, wie Sie sich als Branchenpartner, strategischer Investor oder Kapitalgeber einbringen können.", "cta": "Kontakt aufnehmen"}, "footer": "Independent Film Finance & European Film Infrastructure", "disclaimer": "Diese Website informiert allgemein über die LEONIDAS Group und ihre geplanten Plattformen. Sie stellt kein Angebot zur Zeichnung von Finanzinstrumenten und keine Finanz-, Rechts- oder Steuerberatung dar. Mehrere Plattformen und Funktionen befinden sich im Planungs- oder Entwicklungsstadium. © 2026 LEONIDAS.", "x": {"ecoHeadline": "Eine integrierte Plattform für die gesamte Wertschöpfungskette. Acht auf Film spezialisierte Plattformen unter einem Dach — ein integrierter Kreislauf.", "industryBody": "LEONIDAS bindet Produzenten und Verleiher als strategische Partner fest ein. Das schafft Nähe zum Markt, langfristige Kundenbindung und professionelle Schwarmintelligenz — gebündeltes Branchenwissen. Durch die Einbindung vieler erfahrener Marktteilnehmer entwickelt LEONIDAS eine Infrastruktur, die sich an realen Produktions- und Auswertungsprozessen orientiert.", "navMarkt": "Markt", "navWhy": "Warum LEONIDAS", "markt": {"eyebrow": "MARKT & CHANCE", "headline": "Ob ein Film entsteht, entscheidet oft die letzte Finanzierungslücke.", "body": "Neben ihren fertig finanzierten Filmen tragen Produzenten meist mehrere Projekte, die nur zu 50–90 % finanziert sind. Ob ein Film entsteht, hängt dabei nicht allein von seiner Qualität ab, sondern oft davon, ob die letzte Finanzierungslücke, die Gap, geschlossen wird — oder auch häufig von der Bankentscheidung über die Zwischenfinanzierung. Zugleich haben sich Banken weitgehend aus der Filmfinanzierung zurückgezogen.", "forcesLabel": "Fünf Kräfte treffen zusammen", "forces": ["Streaming verschiebt die Auswertung.", "Banken ziehen sich aus der Filmfinanzierung zurück.", "Die EU harmonisiert erstmals den Kapitalmarktzugang (ECSP/MiCA).", "Tokenisierte Realwerte wachsen.", "KI verändert die Produktionsökonomie."], "stats": [{"num": "~2.500", "lbl": "in Europa produzierte Spielfilme pro Jahr (EAO 2024)"}, {"num": "~6,6 Mrd. €", "lbl": "europäisches Box Office (EAO 2024)"}, {"num": "~2/3", "lbl": "der europäischen Filme mit Budget unter 3 Mio. €"}, {"num": "~590 Mio. €", "lbl": "adressierbares Gap-Volumen pro Jahr (Base-Case, Modell)"}], "note": "Marktzahlen aus belegten Quellen (EAO, PwC). Das adressierbare Gap-Volumen ist eine modellbasierte Schätzung (Szenario, Spanne ca. 184 Mio.–1,22 Mrd. €), keine Prognose.", "modelNote": "Ein detailliertes, quellenbasiertes Marktmodell zur Zwischen- und GAP-Finanzierung stellen wir qualifizierten Investoren auf Anfrage bereit."}, "moat": {"eyebrow": "WARUM LEONIDAS JETZT", "headline": "Europa braucht eine unabhängige Infrastruktur für seine Geschichten.", "points": ["Finanzierung, Herstellungs-Support, Auswertung, Handelbarkeit und Kinoinfrastruktur greifen in einem gemeinsamen Kreislauf ineinander.", "Ein gemeinsames Green-Light- und Due-Diligence-Verfahren wird mehrfach genutzt — das rationalisiert Kosten und schafft eine gemeinsame Datengrundlage.", "Zugang auch für unabhängige Produzenten, die über klassische Finanzierungswege oft nicht erreicht werden.", "Smart-Contract-basierte Prozesse für nachvollziehbare Erlös- und Beteiligungsströme, soweit rechtlich und technisch möglich."], "body": "Die Medienwelt verändert sich grundlegend. Plattformen, Kapitalmärkte und technologische Systeme entscheiden zunehmend darüber, welche Inhalte entstehen, sichtbar werden und wirtschaftlich bestehen können. Europa verfügt über enorme kreative Stärke, doch es fehlt an einer integrierten Infrastruktur, die Finanzierung, Distribution und Technologie strategisch verbindet. Genau dort setzt LEONIDAS an: mit einem europäischen Ansatz, langfristiger Perspektive und einem klaren Fokus auf unabhängige kulturelle Wertschöpfung. Zur kulturellen Infrastruktur gehören auch reale Orte. Kinos bleiben entscheidend, damit unabhängige Filme öffentlich sichtbar, gemeinschaftlich erlebt und wirtschaftlich ausgewertet werden können. Deshalb denkt LEONIDAS digitale Plattformen und physische Kinoinfrastruktur zusammen."}, "pmvLabPurpose": "PURPOSE – WARUM ES LEONIDAS GIBT", "pmvLabMission": "MISSION – WAS WIR AUFBAUEN", "pmvLabVision": "VISION – WOHIN WIR WOLLEN"}}, "en": {"languageName": "English", "descriptorLine1": "Independent Film Finance", "descriptorLine2": "& European Film Infrastructure", "nav": {"purpose": "Purpose", "mission": "Mission", "vision": "Vision", "ecosystem": "Ecosystem", "roadmap": "Roadmap", "participate": "Get involved", "contact": "Contact"}, "hero": {"eyebrow": "INDEPENDENT FILM FINANCE & EUROPEAN FILM INFRASTRUCTURE", "headline": "We secure and shape the future of European film.", "subheadline": "LEONIDAS is building an integrated European ecosystem — from financing films through to their digital monetisation.", "ctaPrimary": "Explore the ecosystem", "ctaSecondary": "View roadmap"}, "quick": {"headline": "Eight specialised platforms — one integrated cycle.", "body": "LEONIDAS connects financing, production support, exploitation, tradability and cinema infrastructure within one European architecture. Projects are assessed in a structured way, financing gaps are addressed, suitable production and exploitation routes are opened up, and revenue streams are connected more effectively over the long term."}, "purpose": {"eyebrow": "WHY LEONIDAS EXISTS", "headline": "Film is cultural heritage. An economic asset. Socially relevant. And infrastructure.", "body": "Europe needs independent films, strong production structures and places where stories can be seen. LEONIDAS aims to strengthen the economic, technological and infrastructural conditions required for this over the long term."}, "mission": {"eyebrow": "WHAT WE ARE BUILDING", "headline": "We connect what is fragmented today.", "body": "Europe's film economy is creatively strong but structurally fragmented. Financing, distribution, rights management, trading, cinema infrastructure, technology and artificial intelligence have so far mostly been thought of separately. LEONIDAS is building a shared infrastructure that connects these areas. For producers. For distributors. For investors. For creatives. For Europe."}, "vision": {"eyebrow": "WHERE WE ARE GOING", "headline": "Film as an asset class in its own right. Culture as strategic infrastructure.", "body": "LEONIDAS pursues a long-term vision: film and audiovisual content should become established as an asset class in their own right — a professionally structured market with transparent processes, robust data and new access to capital. A market in which audiovisual works can be financed more transparently, supported more efficiently, exploited better and monetised digitally. At the same time, we understand culture not merely as content, but as strategic infrastructure for an open, diverse and sovereign European society."}, "ecosystem": {"eyebrow": "THE LEONIDAS ECOSYSTEM", "headline": "Eight specialised platforms — one integrated cycle.", "intro": "LEONIDAS is conceived as an umbrella brand. Beneath it, specialised solutions emerge that are connected to one another and grow step by step into a shared infrastructure. Each platform fulfils a clearly defined task. Together they form a cycle: from the selection and financing of a film project through to streaming, tradability, fund-based financing and the long-term preservation of cinema spaces. Projects are reviewed in a structured way, financing gaps are closed, suitable production and exploitation paths are opened up, and revenue streams are connected more effectively over the long term — within a shared European architecture.", "synergiesHeadline": "Assessed once. Reused across the ecosystem. Scalable together.", "synergiesBody": "CineVest and CineExchange share the Green-Light procedure and due diligence. A film project is assessed in a structured way and, once approved, can be processed further across suitable parts of the LEONIDAS ecosystem. This reduces duplication, streamlines costs for producers and creates a shared data foundation for financing, tradability, exploitation and fund-based portfolios.", "cards": [{"name": "CineVest", "tagline": "GAP financing for independent film projects.", "body": "CineVest is the planned platform for project-specific GAP financing. Digital project-based financial instruments can be structured for selected films and made accessible to suitable capital providers. This is intended to close a producer's remaining financing gap in a transparent and traceable way.", "status": "Phase 1"}, {"name": "CineExchange", "tagline": "Tradability and secondary markets for film assets.", "body": "CineExchange is planned as trading and marketplace infrastructure for selected digital film assets and project-specific financial instruments. Once a project has received Green-Light and has been structured successfully, a secondary market is intended to emerge over time, initially in B2B and later in B2C markets.", "status": "Phase 1 / Phase 3"}, {"name": "CineFinance", "tagline": "Specialist bridge financing for film productions.", "body": "CineFinance addresses the specific bridge-financing needs of the film industry. Committed funds from subsidies, broadcasters, distribution agreements and other financing components often arrive with a delay. CineFinance is intended to provide specialist financing solutions within an appropriate regulatory structure.", "status": "Phase 2"}, {"name": "CineGen", "tagline": "AI-supported filmmaking with industry expertise.", "body": "CineGen is developing an AI-supported production and collaboration platform for audiovisual content. Its distinctive feature: established filmmaking trades and departments remain structurally represented. Industry expertise is carried into the next production reality rather than displaced.", "status": "Phase 1"}, {"name": "CineAI", "tagline": "Streaming and exploitation space for AI-generated films.", "body": "CineAI is conceived as a specialised streaming and exploitation platform for AI-generated audiovisual content. It creates an early market and learning environment for new formats and is intended to converge with CineStream over time. Digital rights and revenue models may also be integrated in the future.", "status": "Phase 1"}, {"name": "CineStream", "tagline": "Streaming, exploitation and digital monetisation.", "body": "CineStream is the planned streaming and exploitation platform for films from the LEONIDAS ecosystem and, over time, also for external content. Its goal is transparent monetisation along the relevant rights and revenue structure. Where legally and technically feasible, automated micropayments may support future revenue participation.", "status": "Phase 2"}, {"name": "CineProperties", "tagline": "Spaces for the future of cinema.", "body": "CineProperties is conceived as a long-term real-estate and infrastructure company for at-risk or strategically important cinema locations. Selected cinema commercial units are to be secured and leased sustainably to operators, preserving cinema as cultural heritage and as an economic exploitation space for films.", "status": "Phase 3"}, {"name": "CineFund", "tagline": "Curated film portfolios for institutional capital.", "body": "CineFund is the planned fund-based infrastructure within the LEONIDAS ecosystem. Family offices, institutions and other suitable capital providers may establish their own funds or curated film portfolios and select projects from the CineVest pool. Only projects with confirmed Green-Light for GAP financing will be eligible.", "status": "Phase 2"}]}, "participation": {"eyebrow": "GET INVOLVED", "headline": "Different roles. One shared goal.", "intro": "LEONIDAS is speaking with market participants and capital providers who want to strengthen Europe's film economy for the long term.", "roles": [{"name": "Producers and distributors", "body": "Bring projects, market knowledge and industry expertise and may become strategically involved partners within the ecosystem."}, {"name": "Cinema operators and real-estate partners", "body": "Support the long-term preservation of cinema venues and the development of sustainable operator and leasing models."}, {"name": "Strategic investors", "body": "May invest in LEONIDAS or individual group companies and support the long-term development of the infrastructure."}, {"name": "Project-specific capital providers", "body": "Provide capital for selected GAP financings via CineVest and close financing gaps for individual film projects."}, {"name": "Institutional capital providers and family offices", "body": "May establish curated film portfolios via CineFund and select suitable projects from the CineVest pool."}], "cta": "Request a conversation"}, "roadmap": {"eyebrow": "OUR PATH", "headline": "Step by step towards European film infrastructure.", "phases": [{"title": "Phase 1 — Foundation and market entry", "body": "LEONIDAS, CineVest, CineExchange B2B, CineGen, CineAI and first strategic partnerships."}, {"title": "Phase 2 — Financing and exploitation ecosystem", "body": "CineFinance, CineFund, CineStream and the Film & Finance Summit."}, {"title": "Phase 3 — Scaling and infrastructure", "body": "CineExchange B2C — film as an asset class, expansion of CineProperties, European scaling and long-term integration of data, payment and exploitation flows."}]}, "industry": {"eyebrow": "TOGETHER WITH THE INDUSTRY", "headline": "Built with the industry. For the industry.", "body": "LEONIDAS aims to involve producers and distributors as strategic partners. This creates market proximity, long-term customer relationships and professional collective intelligence. By involving experienced market participants, LEONIDAS pools industry knowledge and develops infrastructure based on real production and exploitation processes."}, "closing": {"eyebrow": "SHAPE THE FUTURE TOGETHER", "headline": "So that Europe's stories have a future.", "body": "Let us discuss how you can contribute as an industry partner, strategic investor or capital provider.", "cta": "Get in touch"}, "footer": "Independent Film Finance & European Film Infrastructure", "disclaimer": "This website provides general information about the LEONIDAS Group and its planned platforms. It does not constitute an offer to subscribe for financial instruments, nor financial, legal or tax advice. Several platforms and functions are at the planning or development stage. © 2026 LEONIDAS.", "x": {"ecoHeadline": "One integrated platform for the entire value chain. Eight film-specialised platforms under one roof — one integrated cycle.", "industryBody": "LEONIDAS firmly integrates producers and distributors as strategic partners. This creates proximity to the market, long-term customer loyalty and professional collective intelligence — bundled industry knowledge. By involving many experienced market participants, LEONIDAS develops an infrastructure that is grounded in real production and exploitation processes.", "navMarkt": "Market", "navWhy": "Why LEONIDAS", "markt": {"eyebrow": "MARKET & OPPORTUNITY", "headline": "Whether a film gets made is often decided by the last financing gap.", "body": "Alongside their fully financed films, producers usually carry several projects financed only to 50–90%. Whether a film gets made depends not on its quality alone, but often on whether the last financing gap — the gap — is closed, or frequently on a bank's decision about interim financing. At the same time, banks have largely withdrawn from film finance.", "forcesLabel": "Five forces converge", "forces": ["Streaming reshapes how films are exploited.", "Banks are retreating from film finance.", "The EU harmonises capital-market access for the first time (ECSP/MiCA).", "Tokenised real-world assets are growing.", "AI is changing the economics of production."], "stats": [{"num": "~2,500", "lbl": "feature films produced in Europe per year (EAO 2024)"}, {"num": "~€6.6bn", "lbl": "European box office (EAO 2024)"}, {"num": "~2/3", "lbl": "of European films have budgets below €3m"}, {"num": "~€590m", "lbl": "addressable annual gap volume (base case, model)"}], "note": "Market figures from evidenced sources (EAO, PwC). The addressable gap volume is a model-based estimate (scenario, range approx. €184m–1.22bn), not a forecast.", "modelNote": "A detailed, source-based market model for interim and gap financing is available to qualified investors on request."}, "moat": {"eyebrow": "WHY LEONIDAS NOW", "headline": "Europe needs an independent infrastructure for its stories.", "points": ["Financing, production support, exploitation, tradability and cinema infrastructure interlock within one shared cycle.", "A shared green-light and due-diligence procedure is reused across the group — streamlining costs and creating a common data basis.", "Access also for independent producers who are often not reached through conventional financing routes.", "Smart-contract-based processes for traceable revenue and participation flows, where legally and technically possible."], "body": "The media world is changing fundamentally. Platforms, capital markets and technological systems increasingly decide which content gets made, becomes visible and can survive economically. Europe has enormous creative strength, but it lacks an integrated infrastructure that strategically connects financing, distribution and technology. This is exactly where LEONIDAS comes in: with a European approach, a long-term perspective and a clear focus on independent cultural value creation. Cultural infrastructure also includes real places. Cinemas remain essential so that independent films can be publicly visible, experienced together and exploited economically. That is why LEONIDAS thinks of digital platforms and physical cinema infrastructure together."}, "pmvLabPurpose": "PURPOSE – WHY LEONIDAS EXISTS", "pmvLabMission": "MISSION – WHAT WE ARE BUILDING", "pmvLabVision": "VISION – WHERE WE ARE GOING"}}, "fr": {"languageName": "Français", "descriptorLine1": "Independent Film Finance", "descriptorLine2": "& European Film Infrastructure", "nav": {"purpose": "Raison d’être", "mission": "Mission", "vision": "Vision", "ecosystem": "Écosystème", "roadmap": "Feuille de route", "participate": "Participer", "contact": "Contact"}, "hero": {"eyebrow": "INDEPENDENT FILM FINANCE & EUROPEAN FILM INFRASTRUCTURE", "headline": "Nous protégeons et façonnons l’avenir du cinéma européen.", "subheadline": "LEONIDAS développe un écosystème européen intégré — du financement des films jusqu’à leur monétisation numérique.", "ctaPrimary": "Découvrir l’écosystème", "ctaSecondary": "Voir la feuille de route"}, "quick": {"headline": "Huit plateformes spécialisées — un cycle intégré.", "body": "LEONIDAS relie financement, soutien à la production, exploitation, négociabilité et infrastructures cinématographiques au sein d’une architecture européenne commune. Les projets sont évalués de manière structurée, les déficits de financement sont comblés et les flux de revenus sont mieux reliés sur le long terme."}, "purpose": {"eyebrow": "POURQUOI LEONIDAS EXISTE", "headline": "Le cinéma est un bien culturel. Un actif économique. Un enjeu de société. Et une infrastructure.", "body": "L’Europe a besoin de films indépendants, de structures de production solides et de lieux où les histoires peuvent être vues. LEONIDAS veut renforcer durablement les conditions économiques, technologiques et infrastructurelles nécessaires."}, "mission": {"eyebrow": "CE QUE NOUS CONSTRUISONS", "headline": "Nous relions ce qui est aujourd’hui fragmenté.", "body": "L’économie européenne du cinéma est créativement forte, mais structurellement fragmentée. Financement, distribution, gestion des droits, négoce, infrastructure de salles, technologie et intelligence artificielle ont jusqu’ici été pensés le plus souvent séparément. LEONIDAS développe une infrastructure commune qui relie ces domaines. Pour les producteurs. Pour les distributeurs. Pour les investisseurs. Pour les créateurs. Pour l’Europe."}, "vision": {"eyebrow": "NOTRE AMBITION", "headline": "Le cinéma comme classe d’actifs à part entière. La culture comme infrastructure stratégique.", "body": "LEONIDAS poursuit une vision de long terme : le cinéma et les contenus audiovisuels doivent pouvoir s’établir comme une classe d’actifs à part entière — un marché structuré de manière professionnelle, avec des processus transparents, des données fiables et de nouveaux accès au capital. Un marché où les œuvres audiovisuelles peuvent être financées de façon plus transparente, soutenues plus efficacement, mieux exploitées et monétisées numériquement. Dans le même temps, nous concevons la culture non pas seulement comme un contenu, mais comme une infrastructure stratégique pour une société européenne ouverte, diverse et souveraine."}, "ecosystem": {"eyebrow": "L’ÉCOSYSTÈME LEONIDAS", "headline": "Huit plateformes spécialisées — un cycle intégré.", "intro": "LEONIDAS est conçu comme une marque ombrelle. En dessous se développent des solutions spécialisées, reliées entre elles, qui grandissent pas à pas pour former une infrastructure commune. Chaque plateforme remplit une mission clairement définie. Ensemble, elles forment un circuit : de la sélection et du financement d’un projet de film jusqu’au streaming, à la négociabilité, au financement par fonds et à la préservation durable des salles. Les projets sont examinés de manière structurée, les lacunes de financement comblées, des voies de production et d’exploitation adaptées ouvertes, et les flux de revenus mieux reliés sur le long terme — au sein d’une architecture européenne commune.", "synergiesHeadline": "Évalué une fois. Réutilisable dans l’écosystème. Évolutif ensemble.", "synergiesBody": "CineVest et CineExchange partagent la procédure de Green-Light et la due diligence. Une fois validé, un projet peut être traité dans les domaines appropriés de l’écosystème LEONIDAS. Cela réduit les doublons, rationalise les coûts pour les producteurs et crée une base de données commune pour le financement, la négociabilité, l’exploitation et les portefeuilles de fonds.", "cards": [{"name": "CineVest", "tagline": "Financement GAP pour les projets de films indépendants.", "body": "CineVest est la plateforme prévue pour le financement GAP par projet. Des instruments financiers numériques liés à un projet peuvent être structurés pour des films sélectionnés et rendus accessibles à des apporteurs de capitaux appropriés afin de combler le déficit de financement restant du producteur de manière transparente.", "status": "Phase 1"}, {"name": "CineExchange", "tagline": "Négociabilité et marchés secondaires pour les actifs cinématographiques.", "body": "CineExchange est conçue comme une infrastructure de négociation et de marché pour certains actifs cinématographiques numériques et instruments financiers liés à des projets. Après validation et structuration, un marché secondaire doit pouvoir se développer, d’abord en B2B puis en B2C.", "status": "Phase 1 / Phase 3"}, {"name": "CineFinance", "tagline": "Financement relais spécialisé pour les productions cinématographiques.", "body": "CineFinance répond aux besoins spécifiques de financement relais du secteur. Les financements engagés par les aides, diffuseurs, accords de distribution ou autres composantes arrivent souvent avec un décalage. CineFinance doit proposer des solutions spécialisées dans une structure réglementaire appropriée.", "status": "Phase 2"}, {"name": "CineGen", "tagline": "Production cinématographique assistée par l’IA et expertise métier.", "body": "CineGen développe une plateforme de production et de collaboration assistée par l’IA. Les métiers et départements traditionnels restent représentés structurellement, afin de faire évoluer les compétences du secteur au lieu de les remplacer.", "status": "Phase 1"}, {"name": "CineAI", "tagline": "Espace de streaming et d’exploitation pour les films générés par l’IA.", "body": "CineAI est conçue comme une plateforme spécialisée pour les contenus audiovisuels générés par l’IA. Elle crée rapidement un marché d’expérimentation pour de nouveaux formats et doit à terme converger avec CineStream.", "status": "Phase 1"}, {"name": "CineStream", "tagline": "Streaming, exploitation et monétisation numérique.", "body": "CineStream est la plateforme prévue pour les films de l’écosystème LEONIDAS et, à terme, pour des contenus externes. L’objectif est une monétisation transparente selon les droits et revenus applicables. Lorsque cela sera juridiquement et techniquement possible, des micropaiements automatisés pourront soutenir la participation aux revenus.", "status": "Phase 2"}, {"name": "CineProperties", "tagline": "Des espaces pour l’avenir du cinéma.", "body": "CineProperties est conçue comme une société immobilière et d’infrastructure à long terme pour des salles menacées ou stratégiquement importantes. Des unités commerciales de cinéma sélectionnées doivent être sécurisées et louées durablement aux exploitants.", "status": "Phase 3"}, {"name": "CineFund", "tagline": "Portefeuilles de films sélectionnés pour le capital institutionnel.", "body": "CineFund est l’infrastructure de fonds prévue au sein de l’écosystème. Family offices, institutions et apporteurs de capitaux appropriés peuvent créer leurs propres fonds ou portefeuilles sélectionnés et choisir des projets du pool CineVest. Seuls les projets disposant du Green-Light GAP sont éligibles.", "status": "Phase 2"}]}, "participation": {"eyebrow": "PARTICIPER", "headline": "Des rôles différents. Un objectif commun.", "intro": "LEONIDAS échange avec les acteurs du marché et les apporteurs de capitaux souhaitant renforcer durablement l’économie cinématographique européenne.", "roles": [{"name": "Producteurs et distributeurs", "body": "Apportent des projets, une connaissance du marché et une expertise sectorielle et peuvent devenir des partenaires stratégiques de l’écosystème."}, {"name": "Exploitants de salles et partenaires immobiliers", "body": "Soutiennent la préservation durable des salles et le développement de modèles d’exploitation et de location viables."}, {"name": "Investisseurs stratégiques", "body": "Peuvent investir dans LEONIDAS ou dans certaines sociétés du groupe et soutenir la construction de l’infrastructure."}, {"name": "Apporteurs de capitaux par projet", "body": "Fournissent du capital pour certains financements GAP via CineVest et comblent les besoins de projets spécifiques."}, {"name": "Investisseurs institutionnels et family offices", "body": "Peuvent constituer des portefeuilles de films via CineFund et sélectionner des projets dans le pool CineVest."}], "cta": "Demander un échange"}, "roadmap": {"eyebrow": "NOTRE TRAJECTOIRE", "headline": "Étape par étape vers une infrastructure cinématographique européenne.", "phases": [{"title": "Phase 1 — Fondations et entrée sur le marché", "body": "LEONIDAS, CineVest, CineExchange B2B, CineGen, CineAI et premiers partenariats stratégiques."}, {"title": "Phase 2 — Écosystème de financement et d’exploitation", "body": "CineFinance, CineFund, CineStream et le Film & Finance Summit."}, {"title": "Phase 3 — Mise à l’échelle et infrastructures", "body": "CineExchange B2C — le film comme classe d’actifs, développement de CineProperties, expansion européenne et interconnexion durable des flux de données, de paiement et d’exploitation."}]}, "industry": {"eyebrow": "AVEC LA FILIÈRE", "headline": "Construit avec le secteur. Pour le secteur.", "body": "LEONIDAS souhaite associer producteurs et distributeurs en tant que partenaires stratégiques. Cela crée proximité avec le marché, fidélité à long terme et intelligence collective professionnelle. L’infrastructure est conçue à partir des réalités de la production et de l’exploitation."}, "closing": {"eyebrow": "FAÇONNER ENSEMBLE", "headline": "Pour que les histoires de l’Europe aient un avenir.", "body": "Échangeons sur la manière dont vous pouvez contribuer en tant que partenaire sectoriel, investisseur stratégique ou apporteur de capitaux.", "cta": "Nous contacter"}, "footer": "Independent Film Finance & European Film Infrastructure", "disclaimer": "Ce site fournit des informations générales sur le groupe LEONIDAS et ses plateformes prévues. Il ne constitue ni une offre de souscription d’instruments financiers, ni un conseil financier, juridique ou fiscal. Plusieurs plateformes et fonctions sont en phase de planification ou de développement. © 2026 LEONIDAS.", "x": {"ecoHeadline": "Une plateforme intégrée pour toute la chaîne de valeur. Huit plateformes spécialisées dans le cinéma sous un même toit — un circuit intégré.", "industryBody": "LEONIDAS intègre fermement les producteurs et les distributeurs en tant que partenaires stratégiques. Cela crée une proximité avec le marché, une fidélité durable et une intelligence collective professionnelle — un savoir sectoriel mutualisé. En associant de nombreux acteurs expérimentés, LEONIDAS développe une infrastructure ancrée dans les processus réels de production et d’exploitation.", "navMarkt": "Marché", "navWhy": "Pourquoi LEONIDAS", "markt": {"eyebrow": "MARCHÉ & OPPORTUNITÉ", "headline": "Qu’un film voie le jour dépend souvent de la dernière lacune de financement.", "body": "Outre leurs films entièrement financés, les producteurs portent souvent plusieurs projets financés à seulement 50–90 %. Qu’un film voie le jour ne dépend pas de sa seule qualité, mais souvent de la possibilité de combler la dernière lacune de financement — le gap —, ou fréquemment d’une décision bancaire sur le financement-relais. Dans le même temps, les banques se sont largement retirées du financement du cinéma.", "forcesLabel": "Cinq forces convergent", "forces": ["Le streaming transforme l’exploitation des films.", "Les banques se retirent du financement du cinéma.", "L’UE harmonise pour la première fois l’accès aux marchés de capitaux (ECSP/MiCA).", "Les actifs réels tokenisés se développent.", "L’IA transforme l’économie de la production."], "stats": [{"num": "~2 500", "lbl": "longs métrages produits en Europe par an (OEA 2024)"}, {"num": "~6,6 Md€", "lbl": "box-office européen (OEA 2024)"}, {"num": "~2/3", "lbl": "des films européens ont un budget inférieur à 3 M€"}, {"num": "~590 M€", "lbl": "volume annuel de financement-relais adressable (cas de base, modèle)"}], "note": "Chiffres de marché issus de sources avérées (OEA, PwC). Le volume adressable est une estimation fondée sur un modèle (scénario, fourchette d’env. 184 M€–1,22 Md€), et non une prévision.", "modelNote": "Un modèle de marché détaillé et fondé sur des sources, pour le financement-relais et le financement du gap, est disponible sur demande pour les investisseurs qualifiés."}, "moat": {"eyebrow": "POURQUOI LEONIDAS MAINTENANT", "headline": "L’Europe a besoin d’une infrastructure indépendante pour ses récits.", "points": ["Financement, soutien à la fabrication, exploitation, négociabilité et infrastructure de salles s’articulent au sein d’un même circuit.", "Une procédure commune de green-light et de due diligence est réutilisée à plusieurs reprises — ce qui rationalise les coûts et crée une base de données commune.", "Un accès également ouvert aux producteurs indépendants souvent ignorés par les circuits de financement classiques.", "Des processus fondés sur des smart contracts pour des flux de revenus et de participation traçables, dans la mesure du possible sur les plans juridique et technique."], "body": "Le monde des médias change en profondeur. Les plateformes, les marchés de capitaux et les systèmes technologiques déterminent de plus en plus quels contenus voient le jour, deviennent visibles et peuvent exister économiquement. L’Europe dispose d’une immense force créative, mais il lui manque une infrastructure intégrée reliant stratégiquement financement, distribution et technologie. C’est précisément là qu’intervient LEONIDAS : avec une approche européenne, une perspective de long terme et une attention claire à la création de valeur culturelle indépendante. L’infrastructure culturelle comprend aussi des lieux réels. Les salles restent essentielles pour que les films indépendants soient visibles publiquement, vécus collectivement et exploités économiquement. C’est pourquoi LEONIDAS pense ensemble les plateformes numériques et l’infrastructure physique des salles."}, "pmvLabPurpose": "PURPOSE – POURQUOI LEONIDAS EXISTE", "pmvLabMission": "MISSION – CE QUE NOUS CONSTRUISONS", "pmvLabVision": "VISION – NOTRE AMBITION"}}, "es": {"languageName": "Español", "descriptorLine1": "Independent Film Finance", "descriptorLine2": "& European Film Infrastructure", "nav": {"purpose": "Propósito", "mission": "Misión", "vision": "Visión", "ecosystem": "Ecosistema", "roadmap": "Hoja de ruta", "participate": "Participar", "contact": "Contacto"}, "hero": {"eyebrow": "INDEPENDENT FILM FINANCE & EUROPEAN FILM INFRASTRUCTURE", "headline": "Protegemos y damos forma al futuro del cine europeo.", "subheadline": "LEONIDAS desarrolla un ecosistema europeo integrado — desde la financiación de películas hasta su monetización digital.", "ctaPrimary": "Descubrir el ecosistema", "ctaSecondary": "Ver hoja de ruta"}, "quick": {"headline": "Ocho plataformas especializadas — un ciclo integrado.", "body": "LEONIDAS conecta financiación, apoyo a la producción, explotación, negociabilidad e infraestructura cinematográfica dentro de una arquitectura europea común. Los proyectos se evalúan de forma estructurada, se cubren brechas de financiación y se conectan mejor los flujos de ingresos a largo plazo."}, "purpose": {"eyebrow": "POR QUÉ EXISTE LEONIDAS", "headline": "El cine es patrimonio cultural. Un activo económico. Socialmente relevante. Y una infraestructura.", "body": "Europa necesita películas independientes, estructuras de producción sólidas y espacios donde las historias puedan verse. LEONIDAS quiere reforzar a largo plazo las condiciones económicas, tecnológicas y de infraestructura necesarias."}, "mission": {"eyebrow": "LO QUE ESTAMOS CONSTRUYENDO", "headline": "Conectamos lo que hoy está fragmentado.", "body": "La economía cinematográfica europea es creativamente fuerte, pero está estructuralmente fragmentada. Financiación, distribución, gestión de derechos, comercialización, infraestructura de salas, tecnología e inteligencia artificial se han pensado hasta ahora mayoritariamente por separado. LEONIDAS desarrolla una infraestructura común que conecta estos ámbitos. Para productores. Para distribuidores. Para inversores. Para creativos. Para Europa."}, "vision": {"eyebrow": "HACIA DÓNDE VAMOS", "headline": "El cine como una clase de activos propia. La cultura como infraestructura estratégica.", "body": "LEONIDAS persigue una visión a largo plazo: el cine y los contenidos audiovisuales deben poder establecerse como una clase de activos propia — un mercado estructurado de forma profesional, con procesos transparentes, datos sólidos y nuevos accesos al capital. Un mercado en el que las obras audiovisuales puedan financiarse de forma más transparente, apoyarse con mayor eficiencia, explotarse mejor y monetizarse digitalmente. Al mismo tiempo, entendemos la cultura no solo como contenido, sino como infraestructura estratégica para una sociedad europea abierta, diversa y soberana."}, "ecosystem": {"eyebrow": "EL ECOSISTEMA LEONIDAS", "headline": "Ocho plataformas especializadas — un ciclo integrado.", "intro": "LEONIDAS está concebido como una marca paraguas. Bajo ella surgen soluciones especializadas, conectadas entre sí, que crecen paso a paso hasta formar una infraestructura común. Cada plataforma cumple una función claramente definida. Juntas forman un circuito: desde la selección y la financiación de un proyecto cinematográfico hasta el streaming, la negociabilidad, la financiación basada en fondos y la preservación a largo plazo de las salas de cine. Los proyectos se examinan de forma estructurada, se cierran las brechas de financiación, se abren vías de producción y explotación adecuadas y los flujos de ingresos se conectan mejor a largo plazo — dentro de una arquitectura europea común.", "synergiesHeadline": "Evaluado una vez. Reutilizable en todo el ecosistema. Escalable en conjunto.", "synergiesBody": "CineVest y CineExchange comparten el proceso de Green-Light y la due diligence. Una vez aprobado, un proyecto puede seguir utilizándose en los ámbitos adecuados del ecosistema LEONIDAS. Esto reduce duplicidades, racionaliza costes para los productores y crea una base de datos común para financiación, negociabilidad, explotación y carteras de fondos.", "cards": [{"name": "CineVest", "tagline": "Financiación GAP para proyectos cinematográficos independientes.", "body": "CineVest es la plataforma prevista para financiaciones GAP vinculadas a proyectos. Para películas seleccionadas se pueden estructurar instrumentos financieros digitales asociados al proyecto y ponerlos a disposición de proveedores de capital adecuados, con el fin de cerrar de forma transparente la brecha restante del productor.", "status": "Fase 1"}, {"name": "CineExchange", "tagline": "Negociabilidad y mercados secundarios para activos cinematográficos.", "body": "CineExchange se plantea como infraestructura de negociación y mercado para determinados activos cinematográficos digitales e instrumentos financieros vinculados a proyectos. Tras el Green-Light y la estructuración, se pretende desarrollar un mercado secundario, primero B2B y más adelante B2C.", "status": "Fase 1 / Fase 3"}, {"name": "CineFinance", "tagline": "Financiación puente especializada para producciones cinematográficas.", "body": "CineFinance responde a las necesidades específicas de financiación puente del sector. Los fondos comprometidos mediante ayudas, televisiones, acuerdos de distribución u otros componentes suelen llegar con retraso. CineFinance ofrecerá soluciones especializadas dentro de una estructura regulatoria adecuada.", "status": "Fase 2"}, {"name": "CineGen", "tagline": "Producción cinematográfica asistida por IA con conocimiento del sector.", "body": "CineGen desarrolla una plataforma de producción y colaboración asistida por IA. Los oficios y departamentos tradicionales permanecen representados estructuralmente, de modo que la experiencia del sector se traslade a la siguiente realidad productiva en lugar de ser desplazada.", "status": "Fase 1"}, {"name": "CineAI", "tagline": "Espacio de streaming y explotación para películas generadas por IA.", "body": "CineAI se concibe como una plataforma especializada para contenidos audiovisuales generados por IA. Crea un espacio temprano de mercado y aprendizaje para nuevos formatos y, con el tiempo, convergerá con CineStream.", "status": "Fase 1"}, {"name": "CineStream", "tagline": "Streaming, explotación y monetización digital.", "body": "CineStream es la plataforma prevista para películas del ecosistema LEONIDAS y, a futuro, también para contenidos externos. Su objetivo es una monetización transparente conforme a la estructura de derechos e ingresos. Cuando sea legal y técnicamente posible, los micropagos automatizados podrán apoyar la participación en ingresos.", "status": "Fase 2"}, {"name": "CineProperties", "tagline": "Espacios para el futuro del cine.", "body": "CineProperties se concibe como una sociedad inmobiliaria y de infraestructura a largo plazo para salas amenazadas o estratégicamente relevantes. Se asegurarán determinadas unidades comerciales cinematográficas y se arrendarán de forma sostenible a los operadores.", "status": "Fase 3"}, {"name": "CineFund", "tagline": "Carteras cinematográficas seleccionadas para capital institucional.", "body": "CineFund es la infraestructura de fondos prevista dentro del ecosistema. Family offices, instituciones y otros proveedores adecuados podrán crear sus propios fondos o carteras seleccionadas y elegir proyectos del pool de CineVest. Solo serán elegibles los proyectos con Green-Light confirmado para financiación GAP.", "status": "Fase 2"}]}, "participation": {"eyebrow": "PARTICIPAR", "headline": "Distintos papeles. Un objetivo común.", "intro": "LEONIDAS dialoga con participantes del mercado y proveedores de capital que quieren reforzar a largo plazo la economía cinematográfica europea.", "roles": [{"name": "Productores y distribuidores", "body": "Aportan proyectos, conocimiento del mercado y experiencia sectorial y pueden convertirse en socios estratégicos del ecosistema."}, {"name": "Operadores de salas y socios inmobiliarios", "body": "Apoyan la preservación a largo plazo de los cines y el desarrollo de modelos sostenibles de operación y alquiler."}, {"name": "Inversores estratégicos", "body": "Pueden invertir en LEONIDAS o en sociedades individuales del grupo y apoyar la construcción de la infraestructura."}, {"name": "Proveedores de capital por proyecto", "body": "Aportan capital para financiaciones GAP seleccionadas a través de CineVest y cubren brechas de proyectos concretos."}, {"name": "Inversores institucionales y family offices", "body": "Pueden crear carteras cinematográficas seleccionadas mediante CineFund y elegir proyectos adecuados del pool de CineVest."}], "cta": "Solicitar conversación"}, "roadmap": {"eyebrow": "NUESTRO CAMINO", "headline": "Paso a paso hacia la infraestructura cinematográfica europea.", "phases": [{"title": "Fase 1 — Fundamentos y entrada en el mercado", "body": "LEONIDAS, CineVest, CineExchange B2B, CineGen, CineAI y primeras alianzas estratégicas."}, {"title": "Fase 2 — Ecosistema de financiación y explotación", "body": "CineFinance, CineFund, CineStream y el Film & Finance Summit."}, {"title": "Fase 3 — Escalado e infraestructura", "body": "CineExchange B2C — el cine como clase de activo, expansión de CineProperties, escalado europeo e integración de flujos de datos, pagos y explotación."}]}, "industry": {"eyebrow": "JUNTO CON EL SECTOR", "headline": "Construido con el sector. Para el sector.", "body": "LEONIDAS quiere integrar a productores y distribuidores como socios estratégicos. Esto crea cercanía al mercado, fidelidad a largo plazo e inteligencia colectiva profesional. La infraestructura se desarrolla a partir de procesos reales de producción y explotación."}, "closing": {"eyebrow": "DAR FORMA JUNTOS", "headline": "Para que las historias de Europa tengan futuro.", "body": "Hablemos de cómo puede participar como socio sectorial, inversor estratégico o proveedor de capital.", "cta": "Contactar"}, "footer": "Independent Film Finance & European Film Infrastructure", "disclaimer": "Este sitio web ofrece información general sobre el grupo LEONIDAS y sus plataformas previstas. No constituye una oferta de suscripción de instrumentos financieros ni asesoramiento financiero, jurídico o fiscal. Varias plataformas y funciones se encuentran en fase de planificación o desarrollo. © 2026 LEONIDAS.", "x": {"ecoHeadline": "Una plataforma integrada para toda la cadena de valor. Ocho plataformas especializadas en cine bajo un mismo techo — un circuito integrado.", "industryBody": "LEONIDAS integra firmemente a productores y distribuidores como socios estratégicos. Esto genera cercanía al mercado, fidelización a largo plazo e inteligencia colectiva profesional — conocimiento sectorial agrupado. Al incorporar a numerosos agentes con experiencia, LEONIDAS desarrolla una infraestructura anclada en los procesos reales de producción y explotación.", "navMarkt": "Mercado", "navWhy": "Por qué LEONIDAS", "markt": {"eyebrow": "MERCADO Y OPORTUNIDAD", "headline": "Que una película se haga depende a menudo de la última brecha de financiación.", "body": "Además de sus películas totalmente financiadas, los productores suelen tener varios proyectos financiados solo al 50–90 %. Que una película se haga no depende solo de su calidad, sino a menudo de si se cierra la última brecha de financiación — el gap —, o con frecuencia de una decisión bancaria sobre la financiación puente. Al mismo tiempo, los bancos se han retirado en gran medida de la financiación cinematográfica.", "forcesLabel": "Cinco fuerzas convergen", "forces": ["El streaming transforma la explotación de las películas.", "Los bancos se retiran de la financiación del cine.", "La UE armoniza por primera vez el acceso a los mercados de capitales (ECSP/MiCA).", "Los activos reales tokenizados crecen.", "La IA transforma la economía de la producción."], "stats": [{"num": "~2.500", "lbl": "largometrajes producidos en Europa al año (OEA 2024)"}, {"num": "~6.600 M€", "lbl": "taquilla europea (OEA 2024)"}, {"num": "~2/3", "lbl": "de las películas europeas con presupuesto inferior a 3 M€"}, {"num": "~590 M€", "lbl": "volumen anual de financiación puente abordable (caso base, modelo)"}], "note": "Cifras de mercado de fuentes contrastadas (OEA, PwC). El volumen abordable es una estimación basada en un modelo (escenario, rango aprox. 184 M€–1.220 M€), no una previsión.", "modelNote": "Ponemos a disposición de los inversores cualificados, previa solicitud, un modelo de mercado detallado y basado en fuentes para la financiación puente y de gap."}, "moat": {"eyebrow": "POR QUÉ LEONIDAS AHORA", "headline": "Europa necesita una infraestructura independiente para sus historias.", "points": ["Financiación, apoyo a la producción, explotación, negociabilidad e infraestructura de salas se engranan en un mismo circuito.", "Un procedimiento común de green-light y due diligence se reutiliza varias veces, racionalizando costes y creando una base de datos común.", "Acceso también para productores independientes que a menudo no alcanzan las vías de financiación convencionales.", "Procesos basados en smart contracts para flujos de ingresos y participación trazables, en la medida en que sea legal y técnicamente posible."], "body": "El mundo de los medios está cambiando de raíz. Las plataformas, los mercados de capitales y los sistemas tecnológicos deciden cada vez más qué contenidos se crean, se hacen visibles y pueden sostenerse económicamente. Europa cuenta con una enorme fuerza creativa, pero le falta una infraestructura integrada que conecte estratégicamente financiación, distribución y tecnología. Justo ahí interviene LEONIDAS: con un enfoque europeo, una perspectiva a largo plazo y un foco claro en la creación de valor cultural independiente. La infraestructura cultural incluye también lugares reales. Las salas siguen siendo esenciales para que las películas independientes sean visibles públicamente, se vivan en comunidad y se exploten económicamente. Por eso LEONIDAS concibe juntas las plataformas digitales y la infraestructura física de las salas."}, "pmvLabPurpose": "PURPOSE – POR QUÉ EXISTE LEONIDAS", "pmvLabMission": "MISSION – LO QUE ESTAMOS CONSTRUYENDO", "pmvLabVision": "VISION – HACIA DÓNDE VAMOS"}}, "it": {"languageName": "Italiano", "descriptorLine1": "Independent Film Finance", "descriptorLine2": "& European Film Infrastructure", "nav": {"purpose": "Purpose", "mission": "Missione", "vision": "Visione", "ecosystem": "Ecosistema", "roadmap": "Roadmap", "participate": "Partecipa", "contact": "Contatti"}, "hero": {"eyebrow": "INDEPENDENT FILM FINANCE & EUROPEAN FILM INFRASTRUCTURE", "headline": "Proteggiamo e plasmiamo il futuro del cinema europeo.", "subheadline": "LEONIDAS sviluppa un ecosistema europeo integrato — dal finanziamento dei film fino alla loro monetizzazione digitale.", "ctaPrimary": "Scopri l’ecosistema", "ctaSecondary": "Vedi la roadmap"}, "quick": {"headline": "Otto piattaforme specializzate — un ciclo integrato.", "body": "LEONIDAS collega finanziamento, supporto alla produzione, sfruttamento, negoziabilità e infrastrutture cinematografiche all’interno di un’unica architettura europea. I progetti vengono valutati in modo strutturato, i gap finanziari vengono colmati e i flussi di ricavi vengono collegati più efficacemente nel lungo periodo."}, "purpose": {"eyebrow": "PERCHÉ ESISTE LEONIDAS", "headline": "Il cinema è patrimonio culturale. Un bene economico. Socialmente rilevante. E un’infrastruttura.", "body": "L’Europa ha bisogno di film indipendenti, strutture produttive solide e luoghi in cui le storie possano essere viste. LEONIDAS vuole rafforzare nel lungo periodo le condizioni economiche, tecnologiche e infrastrutturali necessarie."}, "mission": {"eyebrow": "COSA STIAMO COSTRUENDO", "headline": "Colleghiamo ciò che oggi è frammentato.", "body": "L’economia cinematografica europea è creativamente forte ma strutturalmente frammentata. Finanziamento, distribuzione, gestione dei diritti, scambio, infrastruttura delle sale, tecnologia e intelligenza artificiale finora sono stati pensati per lo più separatamente. LEONIDAS sviluppa un’infrastruttura comune che collega questi ambiti. Per i produttori. Per i distributori. Per gli investitori. Per i creativi. Per l’Europa."}, "vision": {"eyebrow": "DOVE VOGLIAMO ARRIVARE", "headline": "Il cinema come classe di attivi a sé stante. La cultura come infrastruttura strategica.", "body": "LEONIDAS persegue una visione di lungo termine: il cinema e i contenuti audiovisivi devono poter affermarsi come una classe di attivi a sé stante — un mercato strutturato in modo professionale, con processi trasparenti, dati solidi e nuovi accessi al capitale. Un mercato in cui le opere audiovisive possano essere finanziate in modo più trasparente, sostenute più efficientemente, sfruttate meglio e monetizzate digitalmente. Allo stesso tempo, intendiamo la cultura non solo come contenuto, ma come infrastruttura strategica per una società europea aperta, diversa e sovrana."}, "ecosystem": {"eyebrow": "L’ECOSISTEMA LEONIDAS", "headline": "Otto piattaforme specializzate — un ciclo integrato.", "intro": "LEONIDAS è concepito come un marchio ombrello. Al di sotto nascono soluzioni specializzate, collegate tra loro, che crescono passo dopo passo fino a formare un’infrastruttura comune. Ogni piattaforma svolge un compito chiaramente definito. Insieme formano un circuito: dalla selezione e dal finanziamento di un progetto cinematografico fino allo streaming, alla negoziabilità, al finanziamento tramite fondi e alla conservazione a lungo termine delle sale. I progetti vengono esaminati in modo strutturato, le lacune di finanziamento colmate, aperte vie di produzione e sfruttamento adeguate e i flussi di ricavi collegati meglio nel lungo periodo — all’interno di un’architettura europea comune.", "synergiesHeadline": "Valutato una volta. Riutilizzabile nell’ecosistema. Scalabile insieme.", "synergiesBody": "CineVest e CineExchange condividono la procedura di Green-Light e la due diligence. Dopo l’approvazione, un progetto può essere utilizzato nelle aree idonee dell’ecosistema LEONIDAS. Questo riduce duplicazioni, razionalizza i costi per i produttori e crea una base dati comune per finanziamento, negoziabilità, sfruttamento e portafogli di fondi.", "cards": [{"name": "CineVest", "tagline": "Finanziamento GAP per progetti cinematografici indipendenti.", "body": "CineVest è la piattaforma prevista per finanziamenti GAP legati ai singoli progetti. Per film selezionati possono essere strutturati strumenti finanziari digitali collegati al progetto e messi a disposizione di adeguati fornitori di capitale, così da colmare in modo trasparente il gap residuo del produttore.", "status": "Fase 1"}, {"name": "CineExchange", "tagline": "Negoziabilità e mercati secondari per gli asset cinematografici.", "body": "CineExchange è pensata come infrastruttura di trading e marketplace per determinati asset cinematografici digitali e strumenti finanziari legati ai progetti. Dopo il Green-Light e la strutturazione, si intende sviluppare un mercato secondario, inizialmente B2B e successivamente B2C.", "status": "Fase 1 / Fase 3"}, {"name": "CineFinance", "tagline": "Finanziamento ponte specializzato per produzioni cinematografiche.", "body": "CineFinance risponde alle specifiche esigenze di finanziamento ponte del settore. Fondi già impegnati da sussidi, broadcaster, accordi di distribuzione o altri elementi arrivano spesso in ritardo. CineFinance offrirà soluzioni specializzate in una struttura regolatoria adeguata.", "status": "Fase 2"}, {"name": "CineGen", "tagline": "Produzione cinematografica supportata dall’IA con competenza di settore.", "body": "CineGen sviluppa una piattaforma di produzione e collaborazione supportata dall’IA. I mestieri e i reparti tradizionali restano rappresentati strutturalmente, così che la competenza del settore venga portata nella nuova realtà produttiva invece di essere sostituita.", "status": "Fase 1"}, {"name": "CineAI", "tagline": "Spazio streaming e di sfruttamento per film generati dall’IA.", "body": "CineAI è concepita come piattaforma specializzata per contenuti audiovisivi generati dall’IA. Crea un primo spazio di mercato e apprendimento per nuovi formati e confluirà progressivamente in CineStream.", "status": "Fase 1"}, {"name": "CineStream", "tagline": "Streaming, sfruttamento e monetizzazione digitale.", "body": "CineStream è la piattaforma prevista per i film dell’ecosistema LEONIDAS e, in prospettiva, per contenuti esterni. L’obiettivo è una monetizzazione trasparente lungo la struttura dei diritti e dei ricavi. Quando sarà legalmente e tecnicamente possibile, micropagamenti automatizzati potranno sostenere la partecipazione ai ricavi.", "status": "Fase 2"}, {"name": "CineProperties", "tagline": "Spazi per il futuro del cinema.", "body": "CineProperties è concepita come società immobiliare e infrastrutturale di lungo periodo per sale a rischio o strategicamente rilevanti. Determinate unità commerciali cinematografiche saranno messe in sicurezza e locate in modo sostenibile agli operatori.", "status": "Fase 3"}, {"name": "CineFund", "tagline": "Portafogli cinematografici curati per capitale istituzionale.", "body": "CineFund è l’infrastruttura di fondi prevista nell’ecosistema. Family office, istituzioni e altri fornitori di capitale idonei potranno creare fondi o portafogli curati e selezionare progetti dal pool CineVest. Saranno ammessi solo progetti con Green-Light confermato per il finanziamento GAP.", "status": "Fase 2"}]}, "participation": {"eyebrow": "PARTECIPA", "headline": "Ruoli diversi. Un obiettivo comune.", "intro": "LEONIDAS dialoga con operatori di mercato e fornitori di capitale che vogliono rafforzare nel lungo periodo l’economia cinematografica europea.", "roles": [{"name": "Produttori e distributori", "body": "Apportano progetti, conoscenza del mercato e competenza di settore e possono diventare partner strategici dell’ecosistema."}, {"name": "Gestori di cinema e partner immobiliari", "body": "Sostengono la tutela a lungo termine degli spazi cinematografici e lo sviluppo di modelli sostenibili di gestione e locazione."}, {"name": "Investitori strategici", "body": "Possono investire in LEONIDAS o in singole società del gruppo e sostenere lo sviluppo dell’infrastruttura."}, {"name": "Fornitori di capitale per progetto", "body": "Mettono a disposizione capitale per finanziamenti GAP selezionati tramite CineVest e colmano i gap dei singoli progetti."}, {"name": "Investitori istituzionali e family office", "body": "Possono creare portafogli cinematografici curati tramite CineFund e selezionare progetti idonei dal pool CineVest."}], "cta": "Richiedi un incontro"}, "roadmap": {"eyebrow": "IL NOSTRO PERCORSO", "headline": "Passo dopo passo verso un’infrastruttura cinematografica europea.", "phases": [{"title": "Fase 1 — Fondamenta e ingresso nel mercato", "body": "LEONIDAS, CineVest, CineExchange B2B, CineGen, CineAI e prime partnership strategiche."}, {"title": "Fase 2 — Ecosistema di finanziamento e sfruttamento", "body": "CineFinance, CineFund, CineStream e Film & Finance Summit."}, {"title": "Fase 3 — Scalabilità e infrastruttura", "body": "CineExchange B2C — il cinema come asset class, sviluppo di CineProperties, espansione europea e integrazione duratura dei flussi di dati, pagamenti e sfruttamento."}]}, "industry": {"eyebrow": "INSIEME AL SETTORE", "headline": "Costruito con il settore. Per il settore.", "body": "LEONIDAS vuole coinvolgere produttori e distributori come partner strategici. Questo crea vicinanza al mercato, fidelizzazione di lungo periodo e intelligenza collettiva professionale. L’infrastruttura nasce da processi reali di produzione e sfruttamento."}, "closing": {"eyebrow": "PLASMIAMO INSIEME", "headline": "Affinché le storie d’Europa abbiano un futuro.", "body": "Parliamo di come può contribuire come partner di settore, investitore strategico o fornitore di capitale.", "cta": "Contattaci"}, "footer": "Independent Film Finance & European Film Infrastructure", "disclaimer": "Questo sito fornisce informazioni generali sul gruppo LEONIDAS e sulle sue piattaforme previste. Non costituisce un’offerta di sottoscrizione di strumenti finanziari né consulenza finanziaria, legale o fiscale. Diverse piattaforme e funzioni sono in fase di pianificazione o sviluppo. © 2026 LEONIDAS.", "x": {"ecoHeadline": "Una piattaforma integrata per l’intera catena del valore. Otto piattaforme specializzate nel cinema sotto un unico tetto — un circuito integrato.", "industryBody": "LEONIDAS integra stabilmente produttori e distributori come partner strategici. Questo crea vicinanza al mercato, fidelizzazione a lungo termine e intelligenza collettiva professionale — conoscenza di settore condivisa. Coinvolgendo molti operatori esperti, LEONIDAS sviluppa un’infrastruttura ancorata ai reali processi di produzione e sfruttamento.", "navMarkt": "Mercato", "navWhy": "Perché LEONIDAS", "markt": {"eyebrow": "MERCATO E OPPORTUNITÀ", "headline": "Che un film venga realizzato dipende spesso dall’ultima lacuna di finanziamento.", "body": "Oltre ai film interamente finanziati, i produttori portano spesso avanti diversi progetti finanziati solo al 50–90 %. Che un film venga realizzato non dipende solo dalla sua qualità, ma spesso dal fatto che venga colmata l’ultima lacuna di finanziamento — il gap —, oppure frequentemente da una decisione della banca sul finanziamento ponte. Allo stesso tempo, le banche si sono in gran parte ritirate dal finanziamento cinematografico.", "forcesLabel": "Cinque forze convergono", "forces": ["Lo streaming trasforma lo sfruttamento dei film.", "Le banche si ritirano dal finanziamento del cinema.", "L’UE armonizza per la prima volta l’accesso ai mercati dei capitali (ECSP/MiCA).", "Gli asset reali tokenizzati crescono.", "L’IA trasforma l’economia della produzione."], "stats": [{"num": "~2.500", "lbl": "lungometraggi prodotti in Europa all’anno (OEA 2024)"}, {"num": "~6,6 mld €", "lbl": "box office europeo (OEA 2024)"}, {"num": "~2/3", "lbl": "dei film europei ha un budget inferiore a 3 mln €"}, {"num": "~590 mln €", "lbl": "volume annuo di finanziamento ponte indirizzabile (caso base, modello)"}], "note": "Dati di mercato da fonti documentate (OEA, PwC). Il volume indirizzabile è una stima basata su un modello (scenario, intervallo ca. 184 mln–1,22 mld €), non una previsione.", "modelNote": "Un modello di mercato dettagliato e basato su fonti per il finanziamento ponte e del gap è disponibile su richiesta per gli investitori qualificati."}, "moat": {"eyebrow": "PERCHÉ LEONIDAS ORA", "headline": "L’Europa ha bisogno di un’infrastruttura indipendente per le sue storie.", "points": ["Finanziamento, supporto alla produzione, sfruttamento, negoziabilità e infrastruttura delle sale si integrano in un unico circuito.", "Una procedura comune di green-light e due diligence viene riutilizzata più volte, razionalizzando i costi e creando una base dati condivisa.", "Accesso anche per produttori indipendenti spesso non raggiunti dai canali di finanziamento tradizionali.", "Processi basati su smart contract per flussi di ricavi e partecipazione tracciabili,
