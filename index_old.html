 ove giuridicamente e tecnicamente possibile."], "body": "Il mondo dei media sta cambiando profondamente. Piattaforme, mercati dei capitali e sistemi tecnologici decidono sempre più quali contenuti nascono, diventano visibili e possono reggersi economicamente. L’Europa dispone di un’enorme forza creativa, ma le manca un’infrastruttura integrata che colleghi strategicamente finanziamento, distribuzione e tecnologia. È proprio qui che interviene LEONIDAS: con un approccio europeo, una prospettiva di lungo termine e un chiaro focus sulla creazione di valore culturale indipendente. L’infrastruttura culturale comprende anche luoghi reali. Le sale restano essenziali affinché i film indipendenti siano visibili al pubblico, vissuti collettivamente e sfruttati economicamente. Per questo LEONIDAS concepisce insieme le piattaforme digitali e l’infrastruttura fisica delle sale."}, "pmvLabPurpose": "PURPOSE – PERCHÉ ESISTE LEONIDAS", "pmvLabMission": "MISSION – COSA STIAMO COSTRUENDO", "pmvLabVision": "VISION – DOVE VOGLIAMO ARRIVARE"}}, "pl": {"languageName": "Polski", "descriptorLine1": "Independent Film Finance", "descriptorLine2": "& European Film Infrastructure", "nav": {"purpose": "Cel", "mission": "Misja", "vision": "Wizja", "ecosystem": "Ekosystem", "roadmap": "Plan rozwoju", "participate": "Współpraca", "contact": "Kontakt"}, "hero": {"eyebrow": "INDEPENDENT FILM FINANCE & EUROPEAN FILM INFRASTRUCTURE", "headline": "Chronimy i kształtujemy przyszłość europejskiego filmu.", "subheadline": "LEONIDAS rozwija zintegrowany europejski ekosystem — od finansowania filmów po ich cyfrową monetyzację.", "ctaPrimary": "Poznaj ekosystem", "ctaSecondary": "Zobacz plan rozwoju"}, "quick": {"headline": "Osiem wyspecjalizowanych platform — jeden zintegrowany obieg.", "body": "LEONIDAS łączy finansowanie, wsparcie produkcji, eksploatację, zbywalność aktywów oraz infrastrukturę kinową w ramach jednej europejskiej architektury. Projekty są oceniane w uporządkowany sposób, luki finansowe są domykane, a przepływy przychodów lepiej łączone w długim okresie."}, "purpose": {"eyebrow": "DLACZEGO ISTNIEJE LEONIDAS", "headline": "Film jest dobrem kultury. Aktywem gospodarczym. Ma znaczenie społeczne. I jest infrastrukturą.", "body": "Europa potrzebuje niezależnych filmów, silnych struktur produkcyjnych oraz miejsc, w których historie mogą być oglądane. LEONIDAS chce długoterminowo wzmacniać warunki ekonomiczne, technologiczne i infrastrukturalne."}, "mission": {"eyebrow": "CO BUDUJEMY", "headline": "Łączymy to, co dziś jest rozproszone.", "body": "Europejska gospodarka filmowa jest twórczo silna, ale strukturalnie rozdrobniona. Finansowanie, dystrybucja, zarządzanie prawami, obrót, infrastruktura kin, technologia i sztuczna inteligencja były dotąd najczęściej traktowane oddzielnie. LEONIDAS rozwija wspólną infrastrukturę, która łączy te obszary. Dla producentów. Dla dystrybutorów. Dla inwestorów. Dla twórców. Dla Europy."}, "vision": {"eyebrow": "DOKĄD ZMIERZAMY", "headline": "Film jako odrębna klasa aktywów. Kultura jako strategiczna infrastruktura.", "body": "LEONIDAS realizuje długoterminową wizję: film i treści audiowizualne powinny móc ustanowić się jako odrębna klasa aktywów — profesjonalnie ustrukturyzowany rynek z przejrzystymi procesami, wiarygodnymi danymi i nowym dostępem do kapitału. Rynek, na którym dzieła audiowizualne mogą być finansowane przejrzyściej, wspierane efektywniej, lepiej eksploatowane i cyfrowo monetyzowane. Jednocześnie rozumiemy kulturę nie tylko jako treść, lecz jako strategiczną infrastrukturę dla otwartego, różnorodnego i suwerennego społeczeństwa europejskiego."}, "ecosystem": {"eyebrow": "EKOSYSTEM LEONIDAS", "headline": "Osiem wyspecjalizowanych platform — jeden zintegrowany obieg.", "intro": "LEONIDAS pomyślany jest jako marka parasolowa. Pod nią powstają wyspecjalizowane rozwiązania, które są ze sobą połączone i stopniowo wyrastają we wspólną infrastrukturę. Każda platforma pełni jasno określone zadanie. Razem tworzą obieg: od wyboru i finansowania projektu filmowego po streaming, zbywalność, finansowanie oparte na funduszach i długoterminowe zachowanie przestrzeni kinowych. Projekty są analizowane w sposób ustrukturyzowany, luki finansowe zamykane, otwierane odpowiednie ścieżki produkcji i eksploatacji, a strumienie przychodów lepiej łączone w długim okresie — w ramach wspólnej europejskiej architektury.", "synergiesHeadline": "Jedna ocena. Wiele zastosowań. Wspólna skalowalność.", "synergiesBody": "CineVest i CineExchange współdzielą procedurę Green-Light oraz due diligence. Po zatwierdzeniu projekt może być wykorzystywany w odpowiednich obszarach ekosystemu LEONIDAS. Ogranicza to powielanie pracy, racjonalizuje koszty producentów i tworzy wspólną bazę danych dla finansowania, zbywalności, eksploatacji i portfeli funduszowych.", "cards": [{"name": "CineVest", "tagline": "Finansowanie GAP dla niezależnych projektów filmowych.", "body": "CineVest to planowana platforma finansowania GAP na poziomie projektu. Dla wybranych filmów mogą być strukturyzowane cyfrowe instrumenty finansowe powiązane z projektem i udostępniane odpowiednim dostawcom kapitału w celu przejrzystego domknięcia pozostałej luki finansowej producenta.", "status": "Faza 1"}, {"name": "CineExchange", "tagline": "Zbywalność i rynki wtórne dla aktywów filmowych.", "body": "CineExchange ma być infrastrukturą obrotu i marketplace’em dla wybranych cyfrowych aktywów filmowych oraz instrumentów powiązanych z projektami. Po Green-Light i strukturyzacji projektu ma stopniowo powstać rynek wtórny, najpierw B2B, a następnie B2C.", "status": "Faza 1 / Faza 3"}, {"name": "CineFinance", "tagline": "Specjalistyczne finansowanie pomostowe dla produkcji filmowych.", "body": "CineFinance odpowiada na szczególne potrzeby finansowania pomostowego branży filmowej. Zadeklarowane środki z dotacji, telewizji, umów dystrybucyjnych i innych elementów finansowania często wpływają z opóźnieniem. CineFinance ma oferować specjalistyczne rozwiązania w odpowiedniej strukturze regulacyjnej.", "status": "Faza 2"}, {"name": "CineGen", "tagline": "Produkcja filmowa wspierana przez AI i kompetencje branżowe.", "body": "CineGen rozwija platformę produkcji i współpracy wspieraną przez AI. Tradycyjne zawody i działy produkcji pozostają odwzorowane strukturalnie, dzięki czemu kompetencje branżowe przechodzą do nowej rzeczywistości produkcyjnej zamiast być wypierane.", "status": "Faza 1"}, {"name": "CineAI", "tagline": "Przestrzeń streamingowa i eksploatacyjna dla filmów generowanych przez AI.", "body": "CineAI jest projektowana jako wyspecjalizowana platforma dla treści audiowizualnych generowanych przez AI. Tworzy wczesny rynek i przestrzeń do uczenia się nowych formatów, a docelowo ma połączyć się z CineStream.", "status": "Faza 1"}, {"name": "CineStream", "tagline": "Streaming, eksploatacja i cyfrowa monetyzacja.", "body": "CineStream to planowana platforma dla filmów z ekosystemu LEONIDAS, a w przyszłości także dla treści zewnętrznych. Celem jest przejrzysta monetyzacja zgodna ze strukturą praw i przychodów. Gdy będzie to prawnie i technicznie możliwe, automatyczne mikropłatności mogą wspierać udział w przychodach.", "status": "Faza 2"}, {"name": "CineProperties", "tagline": "Przestrzeń dla przyszłości kina.", "body": "CineProperties jest projektowana jako długoterminowa spółka nieruchomościowa i infrastrukturalna dla zagrożonych lub strategicznie ważnych lokalizacji kinowych. Wybrane lokale kinowe mają być zabezpieczane i wynajmowane operatorom na zrównoważonych warunkach.", "status": "Faza 3"}, {"name": "CineFund", "tagline": "Kuratorowane portfele filmowe dla kapitału instytucjonalnego.", "body": "CineFund to planowana infrastruktura funduszowa w ekosystemie. Family offices, instytucje i inni odpowiedni dostawcy kapitału mogą tworzyć własne fundusze lub kuratorowane portfele filmowe i wybierać projekty z puli CineVest. Kwalifikują się wyłącznie projekty z potwierdzonym Green-Light dla finansowania GAP.", "status": "Faza 2"}]}, "participation": {"eyebrow": "WSPÓŁPRACA", "headline": "Różne role. Wspólny cel.", "intro": "LEONIDAS rozmawia z uczestnikami rynku i dostawcami kapitału, którzy chcą długoterminowo wzmacniać europejską gospodarkę filmową.", "roles": [{"name": "Producenci i dystrybutorzy", "body": "Wnoszą projekty, wiedzę rynkową i kompetencje branżowe oraz mogą stać się strategicznymi partnerami ekosystemu."}, {"name": "Operatorzy kin i partnerzy nieruchomościowi", "body": "Wspierają długoterminową ochronę przestrzeni kinowych i rozwój zrównoważonych modeli operatorskich oraz najmu."}, {"name": "Inwestorzy strategiczni", "body": "Mogą inwestować w LEONIDAS lub poszczególne spółki grupy i wspierać rozwój infrastruktury."}, {"name": "Dostawcy kapitału projektowego", "body": "Zapewniają kapitał dla wybranych finansowań GAP za pośrednictwem CineVest i domykają luki konkretnych projektów."}, {"name": "Inwestorzy instytucjonalni i family offices", "body": "Mogą tworzyć kuratorowane portfele filmowe poprzez CineFund i wybierać odpowiednie projekty z puli CineVest."}], "cta": "Umów rozmowę"}, "roadmap": {"eyebrow": "NASZA DROGA", "headline": "Krok po kroku ku europejskiej infrastrukturze filmowej.", "phases": [{"title": "Faza 1 — Fundamenty i wejście na rynek", "body": "LEONIDAS, CineVest, CineExchange B2B, CineGen, CineAI i pierwsze partnerstwa strategiczne."}, {"title": "Faza 2 — Ekosystem finansowania i eksploatacji", "body": "CineFinance, CineFund, CineStream i Film & Finance Summit."}, {"title": "Faza 3 — Skalowanie i infrastruktura", "body": "CineExchange B2C — film jako klasa aktywów, rozwój CineProperties, ekspansja europejska i długoterminowa integracja przepływów danych, płatności i eksploatacji."}]}, "industry": {"eyebrow": "WSPÓLNIE Z BRANŻĄ", "headline": "Budowane z branżą. Dla branży.", "body": "LEONIDAS chce angażować producentów i dystrybutorów jako partnerów strategicznych. Tworzy to bliskość rynku, długoterminowe relacje i profesjonalną inteligencję zbiorową. Infrastruktura powstaje w oparciu o realne procesy produkcji i eksploatacji."}, "closing": {"eyebrow": "KSZTAŁTUJMY WSPÓLNIE", "headline": "Aby europejskie historie miały przyszłość.", "body": "Porozmawiajmy o tym, jak mogą Państwo włączyć się jako partner branżowy, inwestor strategiczny lub dostawca kapitału.", "cta": "Skontaktuj się"}, "footer": "Independent Film Finance & European Film Infrastructure", "disclaimer": "Ta strona zawiera ogólne informacje o grupie LEONIDAS i jej planowanych platformach. Nie stanowi oferty objęcia instrumentów finansowych ani doradztwa finansowego, prawnego czy podatkowego. Kilka platform i funkcji znajduje się w fazie planowania lub rozwoju. © 2026 LEONIDAS.", "x": {"ecoHeadline": "Jedna zintegrowana platforma dla całego łańcucha wartości. Osiem wyspecjalizowanych w filmie platform pod jednym dachem — zintegrowany obieg.", "industryBody": "LEONIDAS trwale włącza producentów i dystrybutorów jako partnerów strategicznych. Tworzy to bliskość rynku, długoterminową lojalność i profesjonalną inteligencję zbiorową — połączoną wiedzę branżową. Dzięki zaangażowaniu wielu doświadczonych uczestników rynku LEONIDAS rozwija infrastrukturę osadzoną w rzeczywistych procesach produkcji i eksploatacji.", "navMarkt": "Rynek", "navWhy": "Dlaczego LEONIDAS", "markt": {"eyebrow": "RYNEK I SZANSA", "headline": "To, czy film powstanie, często zależy od ostatniej luki w finansowaniu.", "body": "Oprócz w pełni sfinansowanych filmów producenci prowadzą zwykle kilka projektów sfinansowanych jedynie w 50–90 %. To, czy film powstanie, nie zależy wyłącznie od jego jakości, lecz często od tego, czy uda się zamknąć ostatnią lukę finansową — gap — albo często od decyzji banku o finansowaniu pomostowym. Jednocześnie banki w dużej mierze wycofały się z finansowania filmów.", "forcesLabel": "Zbiega się pięć sił", "forces": ["Streaming zmienia sposób eksploatacji filmów.", "Banki wycofują się z finansowania filmów.", "UE po raz pierwszy harmonizuje dostęp do rynku kapitałowego (ECSP/MiCA).", "Tokenizowane aktywa rzeczywiste rosną.", "SI zmienia ekonomię produkcji."], "stats": [{"num": "~2500", "lbl": "filmów pełnometrażowych produkowanych w Europie rocznie (EOA 2024)"}, {"num": "~6,6 mld €", "lbl": "europejski box office (EOA 2024)"}, {"num": "~2/3", "lbl": "europejskich filmów ma budżet poniżej 3 mln €"}, {"num": "~590 mln €", "lbl": "adresowalny roczny wolumen finansowania pomostowego (scenariusz bazowy, model)"}], "note": "Dane rynkowe z udokumentowanych źródeł (EOA, PwC). Adresowalny wolumen to szacunek modelowy (scenariusz, zakres ok. 184 mln–1,22 mld €), a nie prognoza.", "modelNote": "Szczegółowy, oparty na źródłach model rynku finansowania pomostowego i gap udostępniamy kwalifikowanym inwestorom na życzenie."}, "moat": {"eyebrow": "DLACZEGO LEONIDAS TERAZ", "headline": "Europa potrzebuje niezależnej infrastruktury dla swoich opowieści.", "points": ["Finansowanie, wsparcie produkcji, eksploatacja, zbywalność i infrastruktura kin łączą się w jednym wspólnym obiegu.", "Wspólna procedura green-light i due diligence jest wielokrotnie wykorzystywana — racjonalizuje koszty i tworzy wspólną bazę danych.", "Dostęp także dla niezależnych producentów, których tradycyjne ścieżki finansowania często nie obejmują.", "Procesy oparte na smart kontraktach dla przejrzystych przepływów przychodów i udziałów, w zakresie prawnie i technicznie możliwym."], "body": "Świat mediów zmienia się zasadniczo. Platformy, rynki kapitałowe i systemy technologiczne coraz częściej decydują o tym, jakie treści powstają, stają się widoczne i mogą utrzymać się ekonomicznie. Europa dysponuje ogromną siłą twórczą, brakuje jej jednak zintegrowanej infrastruktury, która strategicznie łączy finansowanie, dystrybucję i technologię. Właśnie tu wkracza LEONIDAS: z europejskim podejściem, długoterminową perspektywą i wyraźnym naciskiem na niezależne tworzenie wartości kulturowej. Do infrastruktury kulturowej należą także realne miejsca. Kina pozostają kluczowe, aby niezależne filmy mogły być publicznie widoczne, wspólnie przeżywane i ekonomicznie eksploatowane. Dlatego LEONIDAS myśli o platformach cyfrowych i fizycznej infrastrukturze kin łącznie."}, "pmvLabPurpose": "PURPOSE – DLACZEGO ISTNIEJE LEONIDAS", "pmvLabMission": "MISSION – CO BUDUJEMY", "pmvLabVision": "VISION – DOKĄD ZMIERZAMY"}}};

 document.querySelectorAll("[data-i18n]").forEach(function(e){var v=g(L,e.getAttribute("data-i18n"));if(v!=="")e.textContent=v;});

 document.title="LEONIDAS — "+g(L,"descriptorLine1")+" "+g(L,"descriptorLine2");
